  <title>PFA Jobs</title>
  <!-- DEV ONLY: fetch mock activated when sessionStorage.__pfa_fetch_mock is set -->
  <script>
  (function(){
    var raw = sessionStorage.getItem('__pfa_fetch_mock');
    if (!raw) return;
    var mocks; try { mocks = JSON.parse(raw); } catch { return; }
    var origFetch = window.fetch;
    window.fetch = function(input, init) {
      var url = typeof input === 'string' ? input : (input && input.url);
      if (url && url.includes('script.google.com')) {
        var body; try { body = JSON.parse(init && init.body); } catch {}
        var action = body && body.action;
        var resp = mocks[action] || {ok:true, data:{}};
        return Promise.resolve(new Response(JSON.stringify(resp), {status:200, headers:{'Content-Type':'application/json'}}));
      }
      return origFetch.apply(this, arguments);
    };
    console.log('[pfa-mock] fetch interceptor active for actions:', Object.keys(mocks));
  })();
  </script>
